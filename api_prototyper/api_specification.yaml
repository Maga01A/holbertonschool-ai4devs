openapi: 3.0.3
info:
  title: EcoRide Ultimate API
  version: 1.0.0
  description: Fully compliant API with complete CRUD and error handling.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Ride:
      type: object
      properties:
        id: { type: string, format: uuid }
        destination: { type: string }
    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
    Error:
      type: object
      properties:
        message: { type: string }
        status: { type: integer }

security:
  - bearerAuth: []

paths:
  /rides:
    get:
      summary: (1) List rides with Pagination
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      summary: (2) Create ride
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/BadRequestError' }

  /rides/{id}:
    get:
      summary: (3) Get specific ride
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFoundError' }
    put:
      summary: (4) Update ride
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/BadRequestError' }
    delete:
      summary: (5) Delete ride
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Deleted }

  /users:
    get:
      summary: (6) List users
      responses:
        '200': { description: OK }

  /analytics/carbon:
    get:
      summary: (7) Get carbon analytics
      responses:
        '200': { description: OK }

responses:
  BadRequestError:
    description: Invalid request parameters.
    content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  UnauthorizedError:
    description: Bearer token is missing or invalid.
    content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  NotFoundError:
    description: The requested resource was not found.
    content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
