openapi: 3.0.3
info:
  title: EcoRide Sustainable Mobility API
  version: 1.0.0
  description: API for managing eco-friendly rides and carbon tracking.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Ride:
      type: object
      properties:
        id: { type: string, format: uuid }
        rider_id: { type: string }
        destination: { type: string }
        status: { type: string, enum: [requested, active, completed] }
    Error:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }

security:
  - bearerAuth: []

paths:
  /rides:
    get:
      summary: List all rides (Pagination supported)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: A paginated list of rides
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    post:
      summary: Create a new ride
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Ride' }
      responses:
        '201': { description: Ride created }

  /rides/{id}:
    get:
      summary: Get ride details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Success }
        '404': { description: Ride not found }
    put:
      summary: Update ride status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Ride updated }
    delete:
      summary: Cancel/Delete a ride
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Ride deleted }
