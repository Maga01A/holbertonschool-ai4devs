openapi: 3.0.3
info:
  title: ShopFlow E-commerce API
  description: Product, Cart, and Auth management for online retail.
  version: 1.0.0
servers:
  - url: https://api.shopflow.com/v1
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: number }
        category: { type: string }
    Error:
      type: object
      properties:
        error: { type: string }
        code: { type: integer }

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Authenticate user and get token
      responses:
        '200':
          description: Successful login
        '401':
          description: Unauthorized

  /products:
    get:
      summary: List all products with pagination
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Success
    post:
      summary: Create new product (Admin only)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

  /products/{id}:
    get:
      summary: Get product details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
    put:
      summary: Update product
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete product
      responses:
        '204':
          description: Deleted