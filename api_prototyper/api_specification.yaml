openapi: 3.0.3
info:
  title: EcoRide API
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Ride:
      type: object
      properties:
        id: { type: string, format: uuid }
        destination: { type: string }
    Error:
      type: object
      properties:
        message: { type: string }
        status: { type: integer }

security:
  - bearerAuth: []

paths:
  /rides:
    get:
      summary: List rides
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    post:
      summary: Create ride
      responses:
        '201': { description: Created }
        '400': { description: Bad Request }

  /rides/{id}:
    get:
      summary: Get ride
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }
        '404': { description: Not Found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    put:
      summary: Update ride
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK }
        '400': { description: Invalid Input }
    delete:
      summary: Delete ride
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: Deleted }

  /user/profile:
    get:
      summary: Get user profile (5th CRUD operation - Read Profile)
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
